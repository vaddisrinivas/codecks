name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android checks
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Public-source privacy check
        run: python3 tools/secret_surface_check.py
      - name: Enable Android emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Unit tests
        run: ./gradlew --no-daemon :app:testDebugUnitTest
      - name: Android lint
        run: ./gradlew --no-daemon :app:lintDebug
      - name: Managed emulator tests
        run: |
          ./gradlew --no-daemon \
            -PcodecksInstrumentedTestBuildType=debug \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            :app:pixel6Api35DebugAndroidTest
      - name: Debug APK
        run: ./gradlew --no-daemon :app:assembleDebug
      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: codecks-test-reports
          path: |
            app/build/reports/tests
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: ignore
          retention-days: 7
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: codecks-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 7
  mac-actions:
    name: Bundled Mac action verifier
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Verify bundled Mac actions
        run: python3 scripts/verify_mac_actions.py
