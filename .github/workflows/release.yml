name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  android-release:
    name: Signed Android release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      CODECKS_RELEASE_KEY_ALIAS: ${{ secrets.CODECKS_RELEASE_KEY_ALIAS }}
      CODECKS_RELEASE_STORE_PASSWORD: ${{ secrets.CODECKS_RELEASE_STORE_PASSWORD }}
      CODECKS_RELEASE_KEY_PASSWORD: ${{ secrets.CODECKS_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore release keystore
        env:
          CODECKS_RELEASE_KEYSTORE_BASE64: ${{ secrets.CODECKS_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$CODECKS_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$CODECKS_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/codecks-release.jks"
          chmod 600 "$RUNNER_TEMP/codecks-release.jks"
          echo "CODECKS_RELEASE_STORE_FILE=$RUNNER_TEMP/codecks-release.jks" >> "$GITHUB_ENV"
      - name: Public-source privacy check
        run: python3 tools/secret_surface_check.py
      - name: Test and lint
        run: ./gradlew --no-daemon :app:testDebugUnitTest :app:lintDebug
      - name: Build signed APK
        run: ./gradlew --no-daemon :app:assembleRelease
      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk release-artifacts/codecks-${GITHUB_REF_NAME}.apk
          cd release-artifacts
          sha256sum codecks-${GITHUB_REF_NAME}.apk > SHA256SUMS.txt
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" release-artifacts/* --verify-tag --generate-notes --title "Codecks ${GITHUB_REF_NAME}"
