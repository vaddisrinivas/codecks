name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.2"
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  mac-action-verifier:
    name: Bundled Mac action verifier
    if: github.event_name == 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: macos-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
          persist-credentials: false
      - name: Verify exact release tag checkout
        run: |
          test -n "$RELEASE_TAG"
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = \
            "$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
      - name: Verify bundled Mac actions
        run: python3 scripts/verify_mac_actions.py

  build-release-candidate:
    name: Build signed release candidate
    if: github.event_name == 'push' || github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: mac-action-verifier
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      CODECKS_RELEASE_KEY_ALIAS: ${{ secrets.CODECKS_RELEASE_KEY_ALIAS }}
      CODECKS_RELEASE_STORE_PASSWORD: ${{ secrets.CODECKS_RELEASE_STORE_PASSWORD }}
      CODECKS_RELEASE_KEY_PASSWORD: ${{ secrets.CODECKS_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
          persist-credentials: false
      - name: Validate release tag
        run: |
          test -n "$RELEASE_TAG"
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = \
            "$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore release keystore
        env:
          CODECKS_RELEASE_KEYSTORE_BASE64: ${{ secrets.CODECKS_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$CODECKS_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$CODECKS_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/codecks-release.jks"
          chmod 600 "$RUNNER_TEMP/codecks-release.jks"
          echo "CODECKS_RELEASE_STORE_FILE=$RUNNER_TEMP/codecks-release.jks" >> "$GITHUB_ENV"
      - name: Public-source privacy check
        run: python3 tools/secret_surface_check.py
      - name: Enforce unshrunk production release
        run: ./scripts/verify_release_no_shrink.sh
      - name: AI Creator V2 local corpus check
        run: python3 tools/ai_creator_v2_eval.py
      - name: Test, lint, and release-surface checks
        run: ./gradlew --no-daemon :app:check
      - name: Build signed release emulator candidate
        run: |
          ./gradlew --no-daemon :app:assembleRelease :app:assembleReleaseAndroidTest
          ./scripts/verify_release_no_shrink.sh \
            app/build/outputs/apk/release/app-release.apk
      - name: Prepare release candidate artifacts
        run: |
          unzip -Z1 app/build/outputs/apk/androidTest/release/app-release-androidTest.apk \
            | grep -E '^classes([0-9]+)?\.dex$' >/dev/null
          mkdir -p release-candidate
          cp app/build/outputs/apk/release/app-release.apk release-candidate/codecks-release.apk
          sha256sum app/build/outputs/apk/androidTest/release/app-release-androidTest.apk \
            > "$RUNNER_TEMP/codecks-release-androidTest.sha256"
          (
            cd release-candidate
            sha256sum codecks-release.apk > SHA256SUMS.txt
          )
      - name: Enable Android emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          test -c /dev/kvm
          sudo chmod 666 /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
      - name: Run exact signed release on managed emulator
        run: |
          test "$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}')" = \
            "$(sha256sum release-candidate/codecks-release.apk | awk '{print $1}')"
          sha256sum --check "$RUNNER_TEMP/codecks-release-androidTest.sha256"
          ./gradlew --no-daemon \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            :app:pixel6Api35ReleaseAndroidTest
          grep -R --include='*.xml' -q \
            'io.codecks.ui.app.MainActivityStartupInstrumentedTest' \
            app/build/outputs/androidTest-results/managedDevice/release/
          grep -R --include='*.xml' -q \
            'io.codecks.release.ReleaseSshSmokeInstrumentedTest' \
            app/build/outputs/androidTest-results/managedDevice/release/
          grep -R --include='*.xml' -q \
            '<testsuites tests="2" failures="0" errors="0" skipped="1"' \
            app/build/outputs/androidTest-results/managedDevice/release/
          test "$(sha256sum app/build/outputs/apk/release/app-release.apk | awk '{print $1}')" = \
            "$(sha256sum release-candidate/codecks-release.apk | awk '{print $1}')"
          sha256sum --check "$RUNNER_TEMP/codecks-release-androidTest.sha256"
          cd release-candidate
          sha256sum -c SHA256SUMS.txt
      - name: Run debug functional suite on managed emulator
        run: |
          ./gradlew --no-daemon \
            -PcodecksInstrumentedTestBuildType=debug \
            -Pandroid.testoptions.manageddevices.emulator.gpu=swiftshader_indirect \
            :app:pixel6Api35DebugAndroidTest
      - name: Archive signed release emulator results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: codecks-signed-release-emulator-results
          path: |
            app/build/reports/androidTests/managedDevice/release/
            app/build/outputs/androidTest-results/managedDevice/release/
            app/build/reports/androidTests/managedDevice/debug/
            app/build/outputs/androidTest-results/managedDevice/debug/
          if-no-files-found: warn
          retention-days: 3
      - name: Upload release candidate
        uses: actions/upload-artifact@v4
        with:
          name: codecks-release-candidate
          path: |
            release-candidate/codecks-release.apk
            release-candidate/SHA256SUMS.txt
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: build-release-candidate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ inputs.tag || github.ref_name }}
          persist-credentials: false
      - name: Verify exact release tag checkout
        run: |
          git check-ref-format "refs/tags/$RELEASE_TAG"
          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          test "$(git rev-parse HEAD)" = \
            "$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")"
      - uses: actions/download-artifact@v4
        with:
          name: codecks-release-candidate
          path: release-candidate
      - name: Verify release candidate checksum
        run: |
          cd release-candidate
          sha256sum -c SHA256SUMS.txt
      - name: Publish GitHub release
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-candidate/* --clobber
          else
            gh release create "$RELEASE_TAG" release-candidate/* --verify-tag --generate-notes --title "Codecks ${RELEASE_TAG}"
          fi
