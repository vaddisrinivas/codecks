name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag, for example v0.1.2"
        required: true
        type: string
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  android-release:
    name: Signed Android release
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
      CODECKS_RELEASE_KEY_ALIAS: ${{ secrets.CODECKS_RELEASE_KEY_ALIAS }}
      CODECKS_RELEASE_STORE_PASSWORD: ${{ secrets.CODECKS_RELEASE_STORE_PASSWORD }}
      CODECKS_RELEASE_KEY_PASSWORD: ${{ secrets.CODECKS_RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate release tag
        run: |
          test -n "$RELEASE_TAG"
          case "$RELEASE_TAG" in
            v*) ;;
            *) echo "Release tag must start with v: $RELEASE_TAG" >&2; exit 1 ;;
          esac
          git rev-parse "$RELEASE_TAG" >/dev/null
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Restore release keystore
        env:
          CODECKS_RELEASE_KEYSTORE_BASE64: ${{ secrets.CODECKS_RELEASE_KEYSTORE_BASE64 }}
        run: |
          test -n "$CODECKS_RELEASE_KEYSTORE_BASE64"
          printf '%s' "$CODECKS_RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/codecks-release.jks"
          chmod 600 "$RUNNER_TEMP/codecks-release.jks"
          echo "CODECKS_RELEASE_STORE_FILE=$RUNNER_TEMP/codecks-release.jks" >> "$GITHUB_ENV"
      - name: Public-source privacy check
        run: python3 tools/secret_surface_check.py
      - name: AI Creator V2 local corpus check
        run: python3 tools/ai_creator_v2_eval.py
      - name: Test, lint, and release-surface checks
        run: ./gradlew --no-daemon :app:check
      - name: Build signed APK
        run: ./gradlew --no-daemon :app:assembleRelease
      - name: Prepare release artifacts
        run: |
          mkdir -p release-artifacts
          cp app/build/outputs/apk/release/app-release.apk "release-artifacts/codecks-${RELEASE_TAG}.apk"
          cd release-artifacts
          sha256sum "codecks-${RELEASE_TAG}.apk" > SHA256SUMS.txt
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: codecks-${{ env.RELEASE_TAG }}-apk
          path: release-artifacts/*
          if-no-files-found: error
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" release-artifacts/* --clobber
          else
            gh release create "$RELEASE_TAG" release-artifacts/* --verify-tag --generate-notes --title "Codecks ${RELEASE_TAG}"
          fi
